name: Deploy to Streamlit Community Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate Streamlit app
        run: |
          python -c "import streamlit; print('Streamlit version:', streamlit.__version__)"
      
      - name: Deploy notification
        run: |
          echo "✅ Code pushed to main branch"
          echo "🚀 Streamlit will automatically redeploy the app"
          echo "📍 App URL: https://share.streamlit.io/peizhenfei/cost-comparison-analysis"
